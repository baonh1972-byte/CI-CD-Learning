name: CI/CD Docker Flow

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Lấy code từ GitHub về máy ảo của Robot
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Đăng nhập vào Docker Hub bằng "Chìa khóa" trong két sắt
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Robot sẽ tự động Build Image và Push lên kho
      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'my-python-app' bằng tên Repository bạn tạo trên Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:latest